name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate
        run: ./gradlew :shared:compileKotlinJvm

      - name: Read version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [ -z "${version}" ]; then
            echo "Release tag is missing."
            exit 1
          fi

          if [[ "${version}" == *-SNAPSHOT ]]; then
            echo "Tag ${tag} is not releasable."
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Update README version
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "${DEFAULT_BRANCH}"
          git checkout "${DEFAULT_BRANCH}"
          git pull --ff-only origin "${DEFAULT_BRANCH}"

          badge_version="${VERSION//-/--}"
          sed -i "s#Version-[^)]*-orange#Version-${badge_version}-orange#" README.md
          sed -i "s/io.github.5peak2me.kmp:curl-logging:[^\"]*/io.github.5peak2me.kmp:curl-logging:${VERSION}/" README.md

          if ! git diff --quiet -- README.md; then
            git add README.md
            git commit -m "docs(readme): update version to ${VERSION}"
            git push origin "HEAD:${DEFAULT_BRANCH}"
          fi

          git checkout "${GITHUB_SHA}"

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_VERSION_NAME: ${{ steps.version.outputs.version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: ./gradlew :shared:publishAndReleaseToMavenCentral

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "${TAG}" --verify-tag --title "${TAG}" --generate-notes
